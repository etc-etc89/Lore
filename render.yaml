services:
  - type: web
    name: living-lore-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
